name: バグ報告
description: バグや不具合の報告
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: バグの概要
      description: どのようなバグが発生しましたか？
      placeholder: 例）カードフェーズでJOKERカードを使用すると画面がフリーズする
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記載してください。
      placeholder: |
        1. ゲームを開始する
        2. テトリスフェーズでゲームオーバーになる
        3. カードフェーズでJOKERカードを引く
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どのように動作すべきですか？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際にはどのように動作しましたか？
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: ブラウザ
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - その他
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: デバイス
      options:
        - PC
        - スマートフォン
        - タブレット
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境の補足情報
      description: OS、ブラウザのバージョンなど補足があれば記載してください。
      placeholder: 例）Windows 11, Chrome 120
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット
      description: 問題を説明するスクリーンショットがあれば添付してください。
    validations:
      required: false
