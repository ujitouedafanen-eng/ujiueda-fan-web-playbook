name: 機能リクエスト
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 機能の概要
      description: どのような機能を追加・改善したいですか？
      placeholder: 例）テトリスフェーズにスコアランキング機能を追加したい
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要ですか？どのような課題を解決しますか？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 具体的な提案内容
      description: 機能の詳細やイメージを記載してください。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載してください。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他の参考情報やスクリーンショットがあれば記載してください。
    validations:
      required: false
